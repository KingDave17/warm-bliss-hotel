<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Portal</title>
    <link rel="stylesheet" href="./payment2.css" />
  </head>
  <body>
    <div class="container">
      <div id="payment-modal" class="modal hidden">
        <div class="modal-content">
          <span id="close-modal" class="close">&times;</span>
          <h2>Payment Successful!</h2>
          <p>
            Thank you for your payment. Your transaction has been processed
            successfully.
          </p>
          <button id="modal-button">OK</button>
        </div>
      </div>

      <h1>Payment Portal</h1>
      <p>Please fill in your details to complete the transaction.</p>
      <form id="form">
        <div class="group">
          <label for="name">Cardholder Name:</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>
        <div class="group">
          <label for="number">Card Number:</label>
          <input
            type="text"
            id="number"
            placeholder="1234 5678 9012 3456"
            maxlength="20"
            required
          />
        </div>
        <div class="row">
          <div class="group">
            <label for="expiry-date">Expiry Date:</label>
            <input type="month" id="expiry-date" required />
          </div>
          <div class="group small">
            <label for="cvv">CVV:</label>
            <input
              type="password"
              id="cvv"
              placeholder="123"
              required
              maxlength="3"
            />
          </div>
        </div>
        <div class="group">
          <label for="amount">Amount:</label>
          <input type="text" id="amount" placeholder="₦" required />
        </div>
        <button type="submit">Pay Now</button>
      </form>
    </div>
    <script src="./payment2.js"></script>
  </body>
</html>

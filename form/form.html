<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="./form.css" />
  </head>
  <body>
    <div class="container">
      <div id="reservation-modal" class="modal hidden">
        <div class="modal-content">
          <div>
            <h2>✓ Registration Submitted!</h2>
            <p>
              Your registration has been successfully submitted. Redirecting to
              payment...
            </p>
          </div>
          <span id="close-modal" class="close">&times;</span>
        </div>
      </div>

      <h1>Registration Form</h1>
      <form id="reserveForm">
        <fieldset>
          <legend>Personal Details</legend>
          <div class="group">
            <label for="Name">Name</label>
            <input type="text" id="Name" name="Name" />
            <p class="error name-err"></p>
          </div>
          <div class="group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" />
            <p class="error email-err"></p>
          </div>
          <div class="group">
            <label for="Address">Address</label>
            <textarea id="Address" name="Address" rows="3"></textarea>
            <p class="error address-err"></p>
          </div>
          <div class="group">
            <label for="PhoneNum">Phone Number</label>
            <input type="tel" id="PhoneNum" name="PhoneNum" />
            <p class="error num-err"></p>
          </div>
        </fieldset>
        <fieldset>
          <legend>Service Details</legend>

          <div class="group">
            <label for="ServiceType">Room Type</label>
            <select name="service" id="del">
              <option value="deluxe">Deluxe Room</option>
              <option value="executive">Executive Suite</option>
              <option value="family">Family Suite</option>
            </select>
          </div>
          <div class="group">
            <label for="check_in">Check_in Date</label>
            <input type="date" id="check_in" />
            <p class="error in-err"></p>
            <label for="check_out">Check Out Date</label>
            <input type="date" id="check_out" />
            <p class="error out-err"></p>
          </div>
          <div class="group">
            <label for="AdditionalInfo">Additional Information</label>
            <textarea
              id="AdditionalInfo"
              name="AdditionalInfo"
              rows="4"
            ></textarea>
            <p class="error info-err"></p>
          </div>
        </fieldset>

        <div class="group">
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>
    <script type="module" src="./form.js"></script>
  </body>
</html>

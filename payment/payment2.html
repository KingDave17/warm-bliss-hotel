<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Payment | Warm Bliss Hotel</title>
    <link rel="stylesheet" href="payment2.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="payment-success-modal" class="modal hidden">
      <div class="modal-content">
        <div class="success-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <div class="message-body">
          <h2>Payment Confirmed!</h2>
          <p>
            Your luxury stay at <strong>Warm Bliss Hotel</strong> is now booked.
            A confirmation email has been sent to you.
          </p>
        </div>
        <button id="success-close-btn">Go to Dashboard</button>
      </div>
    </div>

    <div class="payment-wrapper">
      <div class="payment-container">
        <div class="order-summary">
          <h2>Order Summary</h2>
          <div class="summary-details">
            <p>
              <strong>Room Type:</strong>
              <span id="display-room-type">Loading...</span>
            </p>
            <p>
              <strong>Total Amount:</strong> <span id="display-amount">₦0</span>
            </p>
          </div>
        </div>

        <div class="payment-form-section">
          <h1>Payment Details</h1>
          <form id="secure-payment-form" novalidate>
            <div class="input-group">
              <label for="cardholder-name">Cardholder Name</label>
              <input type="text" id="cardholder-name" placeholder="John Doe" />
              <p id="name-error" class="error-text hidden">
                This field is required
              </p>
            </div>

            <div class="input-group">
              <label for="card-number">Card Number</label>
              <div class="card-input-wrapper">
                <input
                  type="text"
                  id="card-number"
                  placeholder="1234 5678 9101 1121"
                  maxlength="19"
                />
                <i class="far fa-credit-card"></i>
              </div>
              <p id="card-error" class="error-text hidden">
                This field is required
              </p>
            </div>

            <div class="form-row">
              <div class="input-group">
                <label for="expiry-date">Expiry Date</label>
                <input
                  type="text"
                  id="expiry-date"
                  placeholder="MM/YY"
                  maxlength="5"
                />
                <p id="expiry-error" class="error-text hidden">
                  This field is required
                </p>
              </div>
              <div class="input-group">
                <label for="cvv">CVV</label>
                <input
                  type="password"
                  id="cvv"
                  placeholder="***"
                  maxlength="3"
                />
                <p id="cvv-error" class="error-text hidden">
                  This field is required
                </p>
              </div>
            </div>

            <button type="submit" id="pay-button">Pay Now</button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="payment2.js"></script>
  </body>
</html>
